<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="https://chatgpt.com/backend-api/estuary/content?id=file_00000000ae4071f5926cd8024af615fd&ts=492592&p=fs&cid=1&sig=e0d0930472840af49888c2c95e3ac5e324c908579348aa357dad97376aab2aca&v=0" class="avatar">
      <div>
        <span class="name">Jheninha</span>
        <span class="username">@jhenilopes</span>
      </div>
    </div>

    <p class="post-text">
      Ferrari campeã mundial 2026! Vamo cavalão
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Iludida do caralho kkkkkk</p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Alguém avisa</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
